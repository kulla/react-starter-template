schemaVersion: "1"
kind: mixin
name: asdf
displayName: asdf
description: The `asdf` tool version manager.

commands:
  install:
    #- command: install-asdf
    #  user: "1000"
    #  description: Install asdf
    - command: echo 'export PATH="$HOME/.asdf/shims:$PATH"' >> /etc/sandbox-persistent.sh
      user: "0"
      description: Add asdf shims to $PATH
  startup:
    - command: [update-asdf]
      user: "1000"
      description: Update asdf to latest version
      background: false
    - command: [sync-asdf-tools]
      user: "1000"
      description: Update asdf tools to specified version
      background: false
